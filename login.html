<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Rajdhani:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="icon" href="images/sports-car-logo.svg">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Language & Theme Toggles -->
    <div class="auth-toggles">
        <button class="theme-btn" id="themeToggle" title="Toggle Theme">
            <i data-lucide="moon"></i>
        </button>
        <button class="lang-btn" id="langToggle" title="Toggle RTL/LTR">
            <i data-lucide="globe"></i>
        </button>
    </div>

    <!-- Animated background particles -->
    <div class="bg-particles" id="particles"></div>

    <div class="auth-container">
        <!-- Left decorative panel -->
        <div class="auth-brand">
            <div class="brand-content">
                <a href="index.html" class="logo">
                    <img src="images/sports-car-logo.svg" alt="Velocity Logo" class="logo-icon-img">
                    <div class="logo-text">
                        <span class="logo-main">VELOCITY</span>
                        <span class="logo-accent">MOTORSPORTS</span>
                    </div>
                </a>
                <p class="brand-tagline">Precision Engineering. Unleashed Performance.</p>
                <div class="brand-stats">
                    <div class="brand-stat">
                        <span class="brand-stat-number">20+</span>
                        <span class="brand-stat-label">Years Experience</span>
                    </div>
                    <div class="brand-stat">
                        <span class="brand-stat-number">15K+</span>
                        <span class="brand-stat-label">Cars Serviced</span>
                    </div>
                </div>
            </div>
            <div class="brand-race-stripe"></div>
        </div>

        <!-- Login form panel -->
        <div class="auth-form-panel">
            <div class="auth-form-wrapper">
                <div class="auth-header">
                    <div class="auth-icon">
                        <i data-lucide="log-in"></i>
                    </div>
                    <h2 class="auth-title">Welcome Back</h2>
                    <p class="auth-subtitle">Sign in to access your dashboard</p>
                </div>

                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">
                            <i data-lucide="mail" class="label-icon"></i>
                            Email Address
                        </label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        <div class="input-line"></div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">
                            <i data-lucide="lock" class="label-icon"></i>
                            Password
                        </label>
                        <div class="password-wrapper">
                            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                            <button type="button" class="password-toggle" id="togglePassword">
                                <i data-lucide="eye" id="eyeIcon"></i>
                            </button>
                        </div>
                        <div class="input-line"></div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span class="checkmark"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-login">
                        <span>LOGIN</span>
                        <i data-lucide="arrow-right" class="btn-icon"></i>
                    </button>
                </form>

                <div class="auth-divider">
                    <span>OR</span>
                </div>

                <div class="social-login">
                    <button class="btn-social btn-google">
                        <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span>Continue with Google</span>
                    </button>
                    <button class="btn-social btn-facebook">
                        <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20">
                            <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        <span>Continue with Facebook</span>
                    </button>
                </div>

                <p class="auth-switch">
                    Don't have an account? <a href="register.html" class="switch-link">Register here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
